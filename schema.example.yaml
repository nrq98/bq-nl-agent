# schema.example.yaml
# Copia este fichero como schema.yaml y ajústalo a tus tablas reales de BigQuery.
# El agente lo leerá para generar SQL correcta con los nombres exactos de proyecto/dataset/tabla.

project: mi-proyecto-gcp
dataset: mi_dataset

tables:
  - name: ventas
    full_name: mi-proyecto-gcp.mi_dataset.ventas
    description: "Tabla de ventas con una fila por transacción."
    columns:
      - name: id_venta
        type: STRING
        description: "Identificador único de la venta."
      - name: fecha
        type: DATE
        description: "Fecha de la transacción (YYYY-MM-DD)."
      - name: producto
        type: STRING
        description: "Nombre del producto vendido."
      - name: categoria
        type: STRING
        description: "Categoría del producto (ej: Electrónica, Ropa, Alimentación)."
      - name: importe
        type: FLOAT64
        description: "Importe total de la venta en euros."
      - name: unidades
        type: INT64
        description: "Número de unidades vendidas."
      - name: pais
        type: STRING
        description: "País donde se realizó la venta (código ISO 3166-1 alpha-2)."

  - name: clientes
    full_name: mi-proyecto-gcp.mi_dataset.clientes
    description: "Tabla de clientes registrados."
    columns:
      - name: id_cliente
        type: STRING
        description: "Identificador único del cliente."
      - name: nombre
        type: STRING
        description: "Nombre completo del cliente."
      - name: email
        type: STRING
        description: "Correo electrónico del cliente."
      - name: fecha_registro
        type: DATE
        description: "Fecha en que el cliente se registró."
      - name: segmento
        type: STRING
        description: "Segmento del cliente (Premium, Estándar, Básico)."
